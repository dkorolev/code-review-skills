# .scsh.yml — code-review-skills authoring repo (see PRINCIPLES.md section 8).
# Skills-only manifest: scsh supplies the base image (alpine + opencode + git),
# so there are no version/project/image headers. Each key matches a `.skills/<name>/`
# folder. Reviewers declare an `invocations:` matrix (three model routes each);
# `scsh run --profile code-review` expands them to `{reviewer}-{route}` invocations.
# `scsh installskills` copies this manifest verbatim (matrix intact); expansion
# happens at run time.
#   `scsh run --profile internal-self-check`  the authoring-only family auditor

skills:
  conventions-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-conventions-reviewer-{name}.json
    invocations:
      opencode-gpt-5.5:
        harness: opencode
        model: openai/gpt-5.5
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      opencode-glm-5.2:
        harness: opencode
        model: nebius-glm/zai-org/GLM-5.2
  justification-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-justification-reviewer-{name}.json
    invocations:
      opencode-gpt-5.5:
        harness: opencode
        model: openai/gpt-5.5
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      opencode-glm-5.2:
        harness: opencode
        model: nebius-glm/zai-org/GLM-5.2
  reviewability-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-reviewability-reviewer-{name}.json
    invocations:
      opencode-gpt-5.5:
        harness: opencode
        model: openai/gpt-5.5
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      opencode-glm-5.2:
        harness: opencode
        model: nebius-glm/zai-org/GLM-5.2
  sanity-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-sanity-reviewer-{name}.json
    invocations:
      opencode-gpt-5.5:
        harness: opencode
        model: openai/gpt-5.5
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      opencode-glm-5.2:
        harness: opencode
        model: nebius-glm/zai-org/GLM-5.2
  testing-reviewer:
    profile: code-review
    timeout: 1200
    result: tmp/code-review-testing-reviewer-{name}.json
    invocations:
      opencode-gpt-5.5:
        harness: opencode
        model: openai/gpt-5.5
      claude-opus-4-8:
        harness: claude
        model: claude-opus-4-8
      opencode-glm-5.2:
        harness: opencode
        model: nebius-glm/zai-org/GLM-5.2
  internal-self-check-reviewers:
    harness: opencode
    model: openai/gpt-5.5
    timeout: 600
    profile: internal-self-check
    autoinstall: false
    result: tmp/internal-self-check-reviewers.json
