# .scsh.yml — code-review-skills authoring repo (see PRINCIPLES.md section 8).
# Skills-only manifest: scsh supplies the base image (alpine + opencode + git),
# so there are no version/project/image headers. `scsh installskills <this-repo>` reads
# this manifest and installs every listed skill into the consumer's own .scsh.yml — except
# authoring-only ones named `internal-*` (like internal-self-check-reviewers). Skill
# directories live under .skills/ (.skills/<name>/); manifest keys are skill names.
#
# Every skill is in a profile, so a bare `scsh run` (the default profile) is intentionally a
# no-op — scsh just lists the available profiles. Run one explicitly:
#   `scsh run --profile code-review`          the five reviewers
#   `scsh run --profile internal-self-check`  the authoring-only family auditor

skills:
  conventions-reviewer:
    harness: opencode
    model: openai/gpt-5.5
    timeout: 1200
    profile: code-review
    result: tmp/code-review-conventions-reviewer.json
  justification-reviewer:
    harness: opencode
    model: openai/gpt-5.5
    timeout: 1200
    profile: code-review
    result: tmp/code-review-justification-reviewer.json
  reviewability-reviewer:
    harness: opencode
    model: openai/gpt-5.5
    timeout: 1200
    profile: code-review
    result: tmp/code-review-reviewability-reviewer.json
  sanity-reviewer:
    harness: opencode
    model: openai/gpt-5.5
    timeout: 1200
    profile: code-review
    result: tmp/code-review-sanity-reviewer.json
  testing-reviewer:
    harness: opencode
    model: openai/gpt-5.5
    timeout: 1200
    profile: code-review
    result: tmp/code-review-testing-reviewer.json
  internal-self-check-reviewers:
    harness: opencode
    model: openai/gpt-5.5
    timeout: 600
    profile: internal-self-check
    autoinstall: false
    result: tmp/internal-self-check-reviewers.json
